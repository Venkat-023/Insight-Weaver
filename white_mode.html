<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insight Weaver</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #f2ece0;
  }
</style>
</head>
<body>
<div style="width:100vw;height:100vh;background:#f2ece0;position:relative;overflow:hidden;">
  <canvas id="c" style="position:absolute;inset:0;width:100%;height:100%;display:block;"></canvas>
  <div id="ttl" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;opacity:0;pointer-events:none;z-index:5;white-space:nowrap;">
    <div style="font-family:Georgia,serif;font-weight:400;font-size:48px;letter-spacing:0.18em;color:#1a1208;text-transform:uppercase;text-shadow:0 0 30px #f2ece0,0 0 60px #f2ece0,0 0 90px #f2ece0;">Insight Weaver</div>
    <div style="font-family:Georgia,serif;font-size:12px;letter-spacing:0.35em;color:#7a6040;margin-top:10px;text-shadow:0 0 20px #f2ece0;">research into relationships</div>
  </div>
</div>

<script>
(function(){
  var wrap = document.getElementById('c').parentElement;
  var c = document.getElementById('c');
  var ttl = document.getElementById('ttl');
  var ctx, W, H, raf, t0;
  var WORDS = ['transformer','attention','retrieval','latent','semantic','embedding','citation','network','topology','cluster','similarity','cosine','vector','corpus','inference','gradient','benchmark','recall','entropy','manifold','projection','spectral','graph','convolutional','pooling','query','key','value','encoding','dropout','token','context','softmax','residual','encoder','decoder','sparse','causal','hierarchical','contrastive'];
  var lines = [], marks = [], arrows = [], nodes = [], edges = [];
  function rw() { return WORDS[Math.floor(Math.random() * WORDS.length)]; }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function ease(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function hr(h) { return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) }; }
  var NCOLS = ['#7a2e10','#1a3e28','#1e2e5a','#5a1e48','#3a6020','#5a3800','#2a1e5a','#6a3010','#0e3a30','#3a1e60','#6a2020','#1e4a20','#2a2a6a'];
  var ECOLS = ['#7a2e10','#1a3e28','#1e2e5a','#5a1e48','#3a6020'];

  function setup() {
    W = wrap.offsetWidth; H = wrap.offsetHeight;
    c.width = W; c.height = H;
    ctx = c.getContext('2d');
    lines = []; marks = []; arrows = []; nodes = []; edges = [];
    var lh = 20, ty = 36, nc = 3, cw = (W - 80) / nc;
    for (var col = 0; col < nc; col++) {
      var cx = 44 + col * cw, nl = Math.floor((H - ty - 50) / lh);
      for (var i = 0; i < nl; i++) {
        var wds = []; for (var w = 0; w < 3 + Math.floor(Math.random() * 6); w++) wds.push(rw());
        lines.push({ x: cx, y: ty + i * lh, t: wds.join(' ') });
      }
    }
    var md = [
      {c:0,r:2,type:'circ',col:'#7a2e10'},{c:1,r:5,type:'circ',col:'#1a3e28'},
      {c:2,r:3,type:'circ',col:'#1e2e5a'},{c:0,r:9,type:'line',col:'#5a1e48'},
      {c:1,r:11,type:'circ',col:'#5a1e48'},{c:2,r:8,type:'line',col:'#7a2e10'},
      {c:0,r:14,type:'circ',col:'#3a6020'},{c:1,r:16,type:'line',col:'#1e2e5a'},
      {c:2,r:13,type:'circ',col:'#5a3800'},
    ];
    md.forEach(function(m, i) {
      var cx2 = 44 + m.c * cw, y = ty + m.r * lh;
      if (m.type === 'circ') marks.push({ type:'circ', cx:cx2+65, cy:y+4, rx:55, ry:11, col:m.col, st:0.3+i*0.22, dur:0.45 });
      else marks.push({ type:'line', x1:cx2, x2:cx2+110, y:y+9, col:m.col, st:0.3+i*0.22, dur:0.38 });
    });
    var cx = W / 2, cy = H / 2;
    var r1 = Math.min(W, H) * 0.18, r2 = Math.min(W, H) * 0.38;
    var positions = [{ x: cx, y: cy }];
    for (var i = 0; i < 4; i++) { var a = -Math.PI/2 + i*(Math.PI*2/4); positions.push({ x: cx+Math.cos(a)*r1, y: cy+Math.sin(a)*r1 }); }
    for (var i = 0; i < 8; i++) { var a = -Math.PI/2 + i*(Math.PI*2/8); positions.push({ x: cx+Math.cos(a)*r2, y: cy+Math.sin(a)*r2 }); }
    nodes = positions.map(function(p, i) {
      return { x:p.x, y:p.y, col:NCOLS[i%NCOLS.length], r:0, tr:(i===0?5:i<5?3.5:2.5) };
    });
    var ep = [[0,1],[0,2],[0,3],[0,4],[1,5],[1,6],[2,6],[2,7],[3,7],[3,8],[4,8],[4,9],[1,9],[5,6],[6,7],[7,8],[8,9],[9,10],[10,11],[11,12],[12,5],[0,5],[0,7],[0,9],[0,11],[1,7],[2,9],[3,11],[4,5],[5,8],[6,9],[7,10],[8,11],[9,12]];
    ep.forEach(function(pair, i) {
      var a = pair[0], b = pair[1];
      if (a < nodes.length && b < nodes.length) {
        var na = nodes[a], nb = nodes[b];
        arrows.push({ x1:na.x, y1:na.y, x2:nb.x, y2:nb.y, col:ECOLS[i%ECOLS.length], st:2.0+i*0.055, dur:0.35, src:na, dst:nb });
        edges.push({ src:na, dst:nb, col:ECOLS[i%ECOLS.length] });
      }
    });
  }

  function frame(now) {
    var t = (now - t0) / 1000;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#f2ece0'; ctx.fillRect(0, 0, W, H);
    var tf = clamp(1-(t-2.4)/0.9,0,1), mf = clamp(1-(t-2.6)/1.0,0,1);
    ctx.font = '10.5px Georgia,serif';
    ctx.fillStyle = 'rgba(42,28,12,' + (0.16*tf) + ')';
    lines.forEach(function(l) { ctx.fillText(l.t, l.x, l.y); });
    var nc = 3, cw2 = (W-80)/nc;
    ctx.strokeStyle = 'rgba(42,28,12,' + (0.06*tf) + ')'; ctx.lineWidth = 0.5; ctx.setLineDash([3,7]);
    for (var i = 1; i < nc; i++) { var x = 44+i*cw2; ctx.beginPath(); ctx.moveTo(x,28); ctx.lineTo(x,H-28); ctx.stroke(); }
    ctx.setLineDash([]);
    marks.forEach(function(m) {
      var p = clamp((t-m.st)/m.dur,0,1); if (p <= 0) return;
      var a = ease(p)*0.82*mf, rgb = hr(m.col);
      if (m.type === 'circ') {
        ctx.save(); ctx.translate(m.cx,m.cy); ctx.scale(1,m.ry/m.rx);
        ctx.beginPath(); ctx.arc(0,0,m.rx,-Math.PI/2,-Math.PI/2+p*Math.PI*2,false);
        ctx.restore();
        ctx.strokeStyle = 'rgba('+rgb.r+','+rgb.g+','+rgb.b+','+a+')'; ctx.lineWidth = 1.9; ctx.stroke();
      } else {
        var ex = lerp(m.x1,m.x2,p);
        ctx.beginPath(); ctx.moveTo(m.x1,m.y); ctx.lineTo(ex,m.y+Math.sin(p*Math.PI*3)*1.2);
        ctx.strokeStyle = 'rgba('+rgb.r+','+rgb.g+','+rgb.b+','+(0.82*mf)+')'; ctx.lineWidth = 2; ctx.stroke();
      }
    });
    arrows.forEach(function(h) {
      var p = clamp((t-h.st)/h.dur,0,1); if (p <= 0) return;
      var rgb = hr(h.col), a = ease(p)*0.5*mf;
      var mx = (h.x1+h.x2)/2+(h.y2>h.y1?26:-26), my = (h.y1+h.y2)/2;
      ctx.beginPath(); ctx.moveTo(h.x1,h.y1); ctx.quadraticCurveTo(mx,my,lerp(h.x1,h.x2,p),lerp(h.y1,h.y2,p));
      ctx.strokeStyle = 'rgba('+rgb.r+','+rgb.g+','+rgb.b+','+a+')'; ctx.lineWidth = 1.1; ctx.setLineDash([3,5]); ctx.stroke(); ctx.setLineDash([]);
    });
    if (t >= 3.0) {
      var gp = clamp((t-3.0)/1.8,0,1);
      var ringA = clamp(gp/0.3,0,1)*0.05;
      if (ringA > 0) {
        ctx.strokeStyle = 'rgba(80,55,25,'+ringA+')'; ctx.lineWidth = 0.5; ctx.setLineDash([2,6]);
        [Math.min(W,H)*0.18, Math.min(W,H)*0.38].forEach(function(r) { ctx.beginPath(); ctx.arc(W/2,H/2,r,0,Math.PI*2); ctx.stroke(); });
        ctx.setLineDash([]);
      }
      edges.forEach(function(e, i) {
        var ep2 = clamp((gp-i*0.02)/0.4,0,1); if (ep2 <= 0) return;
        var rgb = hr(e.col);
        ctx.beginPath(); ctx.moveTo(e.src.x,e.src.y); ctx.lineTo(lerp(e.src.x,e.dst.x,ep2),lerp(e.src.y,e.dst.y,ep2));
        ctx.strokeStyle = 'rgba('+rgb.r+','+rgb.g+','+rgb.b+','+(ep2*0.38)+')'; ctx.lineWidth = 0.8; ctx.stroke();
      });
      nodes.forEach(function(n, i) {
        var np = clamp((gp-i*0.04)/0.35,0,1); if (np <= 0) return;
        n.r = n.tr * ease(np);
        var rgb = hr(n.col);
        ctx.beginPath(); ctx.arc(n.x,n.y,n.r+4,0,Math.PI*2);
        ctx.strokeStyle = 'rgba('+rgb.r+','+rgb.g+','+rgb.b+','+(np*0.12)+')'; ctx.lineWidth = 1; ctx.stroke();
        ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
        ctx.fillStyle = 'rgba('+rgb.r+','+rgb.g+','+rgb.b+','+(np*0.92)+')'; ctx.fill();
      });
    }
    var ba = clamp((t-3.8)/1.0,0,1);
    if (ba > 0) { ctx.fillStyle = 'rgba(242,236,224,'+(ba*0.76)+')'; ctx.fillRect(0,0,W,H); }
    ttl.style.opacity = clamp((t-4.6)/1.0,0,1);
    if (t < 12) raf = requestAnimationFrame(frame);
  }

  function play() {
    if (raf) cancelAnimationFrame(raf);
    ttl.style.opacity = 0;
    setup(); t0 = performance.now(); raf = requestAnimationFrame(frame);
  }

  window.addEventListener('resize', function() { play(); });
  play();
})();
</script>
</body>
</html>
